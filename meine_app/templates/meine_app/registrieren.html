{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraSense – Registrieren</title>

    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
</head>

<body class="auth-page">

<div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">
        <img src="{% static 'images/logo.png' %}" alt="FloraSense Logo" class="auth-logo-img">

        <a href="{% url 'dashboard' %}" class="logo">
            Flora<span>Sense</span>
        </a>

        <span class="tagline">
            Intelligente Pflanzenüberwachung
        </span>
    </div>

    <h2>Konto erstellen</h2>

    <!-- ❗ FEHLERMELDUNG -->
    {% if error %}
        <div style="color: red; margin-bottom: 10px;">
            {{ error }}
        </div>
    {% endif %}

    <!-- FORMULAR -->
    <form action="{% url 'registrieren' %}" method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="firstname">Vorname</label>
            <input type="text" id="firstname" name="firstname" placeholder="Max" required>
        </div>

        <div class="form-group">
            <label for="lastname">Nachname</label>
            <input type="text" id="lastname" name="lastname" placeholder="Mustermann" required>
        </div>

        <div class="form-group">
            <label for="email">E-Mail-Adresse</label>
            <input type="email" id="email" name="email" placeholder="name@beispiel.de" required>
        </div>

        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" placeholder="Mindestens 8 Zeichen" required>
        </div>

        <div class="form-group">
            <label for="password-confirm">Passwort wiederholen</label>
            <input type="password" id="password-confirm" name="password-confirm" placeholder="Passwort bestätigen" required>
        </div>

        <input type="submit" value="Konto erstellen" style="margin-top: 10px;">
    </form>

    <!-- LOGIN LINK -->
    <div class="auth-footer">
        Bereits registriert?
        <a href="{% url 'login' %}">Jetzt anmelden</a>
    </div>

</div>

</body>
</html>
