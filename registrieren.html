<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraSense – Registrieren</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-card">

    <div class="auth-logo">
        <div class="auth-logo-img">Logo<br>hier</div>
        <a href="dashboard.html" class="logo">Flora<span>Sense</span></a>
        <span class="tagline">Intelligente Pflanzenüberwachung</span>
    </div>

    <h2>Konto erstellen</h2>

    <form action="/register" method="POST">
        <div class="form-group">
            <label for="firstname">Vorname</label>
            <input type="text" id="firstname" name="firstname" placeholder="Max" required>
        </div>
        <div class="form-group">
            <label for="lastname">Nachname</label>
            <input type="text" id="lastname" name="lastname" placeholder="Mustermann" required>
        </div>
        <div class="form-group">
            <label for="email">E-Mail-Adresse</label>
            <input type="email" id="email" name="email" placeholder="name@beispiel.de" required>
        </div>
        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" placeholder="Mindestens 8 Zeichen" required>
            <span class="input-hint">Mindestens 8 Zeichen, Gross- und Kleinbuchstaben empfohlen.</span>
        </div>
        <div class="form-group">
            <label for="password2">Passwort wiederholen</label>
            <input type="password" id="password2" name="password2" placeholder="Passwort bestätigen" required>
        </div>
        <input type="submit" value="Konto erstellen" style="margin-top: 6px;">
    </form>

    <div class="auth-footer">
        Bereits registriert? <a href="login.html">Jetzt anmelden</a>
    </div>

</div>

</body>
</html>
